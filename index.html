<script>
(async function() {
    try {
        const response = await fetch(
            'https://api.github.com/repos/2529fernando/2529stream/commits?per_page=1&t=' + Date.now()
        );

        const commits = await response.json();

        if (!Array.isArray(commits) || commits.length === 0) return;

        const latestCommit = commits[0].sha;
        const savedCommit = localStorage.getItem('2529stream_commit');

        if (savedCommit === null) {
            localStorage.setItem('2529stream_commit', latestCommit);
            return;
        }

        if (savedCommit !== latestCommit) {

            if ('caches' in window) {
                const cacheNames = await caches.keys();
                await Promise.all(
                    cacheNames.map(cache => caches.delete(cache))
                );
            }

            localStorage.clear();
            sessionStorage.clear();

            localStorage.setItem('2529stream_commit', latestCommit);

            window.location.href =
                window.location.pathname + '?v=' + latestCommit.substring(0,8);
        }

    } catch (err) {
        console.log('GitHub version check error:', err);
    }
})();
</script>

<script>
    function filtrarCatalogo() {
        // Obtenemos lo que el usuario escribió en minúsculas
        var input = document.getElementById('searchInput').value.toLowerCase();
        
        // Seleccionamos todas las secciones (Series y Películas)
        var secciones = document.querySelectorAll('.section');

        secciones.forEach(function(seccion) {
            var tarjetas = seccion.querySelectorAll('.card');
            var hayVisibles = false;

            // Revisamos cada tarjeta dentro de la sección
            tarjetas.forEach(function(tarjeta) {
                var titulo = tarjeta.querySelector('.card-title').innerText.toLowerCase();
                
                // Si el título incluye lo que buscamos, se muestra, si no, se oculta
                if (titulo.indexOf(input) > -1) {
                    tarjeta.style.display = ""; // Vuelve a su estado original
                    hayVisibles = true;
                } else {
                    tarjeta.style.display = "none"; // Se oculta
                }
            });

            // Si toda la sección (ej. Películas) se quedó sin tarjetas que coincidan, ocultamos también el título "Películas"
            var tituloSeccion = seccion.querySelector('h2');
            if (hayVisibles) {
                tituloSeccion.style.display = "block";
            } else {
                tituloSeccion.style.display = "none";
            }
        });
    }
</script>
