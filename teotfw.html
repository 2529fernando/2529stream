    <script>
    (function() {
        try {
            var xhr = new XMLHttpRequest();
            var url = 'https://api.github.com/repos/2529fernando/2529stream/commits?per_page=1&t=' + new Date().getTime();
            
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var commits = JSON.parse(xhr.responseText);
                    if (!commits || !commits.length) return;

                    var latestCommit = commits[0].sha;
                    var savedCommit = null;
                    
                    try { savedCommit = localStorage.getItem('2529stream_commit'); } catch(e) {}

                    if (savedCommit === null) {
                        try { localStorage.setItem('2529stream_commit', latestCommit); } catch(e) {}
                        return;
                    }

                    if (savedCommit !== latestCommit) {
                        try { localStorage.clear(); } catch(e) {}
                        try { sessionStorage.clear(); } catch(e) {}
                        try { localStorage.setItem('2529stream_commit', latestCommit); } catch(e) {}

                        window.location.href = window.location.pathname + '?v=' + latestCommit.substring(0,8);
                    }
                }
            };
            xhr.send();
        } catch (err) {
            console.log('Error de actualizacion:', err);
        }
    })();
    </script>

        .episode-card {
            background-color: #181818;
            border-radius: 8px;
            overflow: hidden;
            display: inline-block;

            width: 300px;
            margin: 0 15px 30px 0;

            transition: transform 0.3s ease, box-shadow 0.3s ease;

        .episode-card:hover {

            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border-color: #444;
        }

        .thumb-container {
            position: relative;
            width: 100%;
            height: 170px;
            background-color: #111;
            background-size: cover;
            background-position: center;
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .play-icon {
            position: absolute; top: 50%; left: 50%;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid white;
        }

        .play-icon::after {
            content: ""; position: absolute; top: 13px; left: 19px;
            border-left: 16px solid white; border-top: 10px solid transparent; border-bottom: 10px solid transparent;
        }

        .episode-card:hover .play-overlay { opacity: 1; }
        .episode-info { padding: 20px; }
        .episode-title { margin: 0; font-size: 1.1rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 768px) {

            .episode-card { width: 100%; margin: 0 0 20px 0; display: block; }

<body>
    <div class="main-wrapper" id="scroll-wrapper">

        <div class="player-container" id="player-section">

        var currentEpisodeIndex = -1;

        var seriesData = {
            title: "The End of the F***ing World",
            description: "James es un joven de 17 años que está bastante seguro de que es un psicópata. Alyssa, también de 17 años, es la personificación de la angustia existencial adolescente. Juntos se embarcan en un viaje por carretera caótico y oscuro.",

                    { title: "1x02 - Episodio 2", thumb: miniaturaT1, url: "https://pub-672eb2a8f4eb4e58842fc4a14bee7b83.r2.dev/t1/02.mp4" },

                ],

                ]
            }
        };

        document.getElementById('series-title').innerText = seriesData.title;
        document.getElementById('series-desc').innerText = seriesData.description;

        var seasonSelect = document.getElementById('season-select');
        for (var s in seriesData.seasons) {
            var opt = document.createElement('option');
            opt.value = s; opt.innerText = s;
            seasonSelect.appendChild(opt);
        }

        function handleSeasonChange() {
            closeInlinePlayer();
            renderEpisodes();
        }

        function renderEpisodes() {
            var container = document.getElementById('episodes-container');
            container.innerHTML = ''; 
            var episodes = seriesData.seasons[seasonSelect.value];
            episodes.forEach(function(ep, index) {
                var card = document.createElement('div');
                card.className = 'episode-card';
                card.onclick = function() { playInline(index); };
                card.innerHTML = '<div class="thumb-container" style="background-image: url(\''+ep.thumb+'\')"><div class="play-overlay"><span class="play-icon"></span></div></div><div class="episode-info"><h3 class="episode-title">'+ep.title+'</h3></div>';
                container.appendChild(card);
            });
        }

        function playInline(index) {
            var episodes = seriesData.seasons[seasonSelect.value];
            if (index < 0 || index >= episodes.length) return;
            currentEpisodeIndex = index;
            var ep = episodes[index];
            videoUrlActual = ep.url;
            var player = document.getElementById('main-video-player');
            document.getElementById('player-section').style.display = 'block';
            player.src = ep.url;
            player.load(); player.play();
            updateNavButtons(episodes.length);
            document.getElementById('scroll-wrapper').scrollTop = document.getElementById('player-section').offsetTop;
        }

        function playPrevious() { if (currentEpisodeIndex > 0) playInline(currentEpisodeIndex - 1); }
        function playNext() { var episodes = seriesData.seasons[seasonSelect.value]; if (currentEpisodeIndex < episodes.length - 1) playInline(currentEpisodeIndex + 1); }

        function updateNavButtons(total) {
            var bP = document.getElementById('btn-prev'), bN = document.getElementById('btn-next');
            bP.disabled = (currentEpisodeIndex <= 0); bN.disabled = (currentEpisodeIndex >= total - 1);
            bP.style.opacity = bP.disabled ? "0.3" : "1"; bN.style.opacity = bN.disabled ? "0.3" : "1";
        }

        function closeInlinePlayer() { var p = document.getElementById('main-video-player'); p.pause(); p.src = ""; document.getElementById('player-section').style.display = 'none'; currentEpisodeIndex = -1; }

        function abrirEnVLC() { if (videoUrlActual) { try { window.top.location.href = "vlc://" + videoUrlActual; } catch (e) { window.location.href = "vlc://" + videoUrlActual; } } }

        function copiarEnlace() {
            if (!videoUrlActual) return;
            var t = document.createElement("textarea"); t.value = videoUrlActual; t.style.position = "fixed"; t.style.top = "-99px";
            document.body.appendChild(t); t.focus(); t.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(t);
        }

        renderEpisodes();
    </script>
